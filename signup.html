<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f5f8">
<title>TRACKTION — Account</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
*::-webkit-scrollbar{display:none;}*{scrollbar-width:none;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#f4f5f8;color:#1a1a2e;}
body{display:flex;flex-direction:column;align-items:center;animation:pgIn 0.15s ease;}
@keyframes pgIn{from{opacity:0;}to{opacity:1;}}
.page{width:100%;max-width:430px;margin:0 auto;}

/* HEADER — matches index.html exactly */
.t-header{background:white;padding:16px 16px 13px;display:flex;justify-content:center;align-items:center;border-bottom:0.5px solid #f0f0f0;position:sticky;top:0;z-index:50;width:100%;max-width:430px;}

/* APP HEADER (settings/profile) */
.t-app-header{background:white;padding:14px 16px 12px;display:flex;align-items:center;border-bottom:0.5px solid #f0f0f0;position:sticky;top:0;z-index:50;width:100%;max-width:430px;flex-shrink:0;}
.t-app-title{font-family:monospace;font-size:14px;font-weight:900;color:#1a1a2e;letter-spacing:1px;margin:0 auto;}
.t-back{background:#f4f5f8;border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#1a1a2e;text-decoration:none;flex-shrink:0;}

/* WORDMARK — 30px, matches index.html */
.wordmark{display:flex;align-items:center;line-height:1;}
.wm-track{font-family:monospace;font-size:30px;font-weight:900;color:#0066ff;letter-spacing:-1px;}
.wm-ti{font-family:monospace;font-size:30px;font-weight:900;color:#ff2244;letter-spacing:-1px;}
.wm-n{font-family:monospace;font-size:30px;font-weight:900;color:#ffb300;letter-spacing:-1px;}

/* CARDS — matches index.html exactly */
.card{background:white;border-radius:16px;margin:8px 12px;padding:16px;border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 4px rgba(0,0,0,0.04);}

/* SECTION LABEL — matches index.html */
.sec-lbl{font-size:10px;font-weight:800;color:rgba(26,26,46,0.45);letter-spacing:1.2px;text-transform:uppercase;margin:12px 12px 6px;display:block;}

/* BUTTONS */
.btn-primary{width:100%;padding:15px;border-radius:12px;border:none;background:#0066ff;color:white;font-family:monospace;font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer;}
.btn-primary:active{opacity:0.88;}
.btn-ghost{width:100%;padding:15px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.08);background:transparent;color:#1a1a2e;font-family:monospace;font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer;}

/* FORM INPUTS */
.finp{width:100%;background:white;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;color:#1a1a2e;font-size:15px;padding:14px 16px;outline:none;font-family:inherit;}
.finp:focus{border:1.5px solid #0066ff;}
.finp::placeholder{color:rgba(26,26,46,0.35);}
.pw-wrap{position:relative;}
.eye-btn{position:absolute;right:14px;top:14px;background:none;border:none;font-size:18px;color:rgba(26,26,46,0.35);cursor:pointer;}

/* NAV — exact from index.html */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;border-top:0.5px solid rgba(0,0,0,0.08);z-index:100;}
.bnav-inner{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;align-items:center;padding:8px 2px 14px;}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px;color:#1a1a2e;cursor:pointer;padding:4px 2px;text-decoration:none;}
.nbtn.on{color:#0066ff;}
.nav-icon-wrap{padding:7px 14px;border-radius:12px;font-size:20px;line-height:1;border:1.5px solid transparent;transition:all 0.2s;filter:grayscale(0.2);}
.nbtn.on .nav-icon-wrap{background:#f0f5ff;border-color:#0066ff;filter:none;}
.nbtn-center{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px;color:#0066ff;cursor:pointer;position:relative;top:-18px;text-decoration:none;}
.nav-plus{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#0066ff,#0044cc);display:flex;align-items:center;justify-content:center;color:white;font-size:26px;font-weight:900;box-shadow:0 6px 20px rgba(0,102,255,0.4);line-height:1;transition:transform 0.15s;}
.nbtn-center:active .nav-plus{transform:scale(0.93);}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;white-space:nowrap;pointer-events:none;animation:fadeUp 0.2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

body{overflow-y:auto;}
.screen{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;padding:32px 20px 32px;box-sizing:border-box;background:#f4f5f8;}
</style></head><body>

<!-- CREATE ACCOUNT -->
<div class="screen" id="panel-create">
  <div style="margin-bottom:20px;"><button onclick="goTo('welcome.html')" class="t-back">←</button></div>
  <div style="text-align:center;margin-bottom:28px;"><div style="display:inline-flex;align-items:center;white-space:nowrap;"><span style="font-family:monospace;font-weight:900;font-size:40px;color:#0066ff;line-height:1;">TRACK</span><span style="font-family:monospace;font-weight:900;font-size:40px;color:#ff2244;line-height:1;">TI</span><svg width="42" height="42" viewBox="0 0 120 120" style="display:inline-block;vertical-align:middle;flex-shrink:0;margin:0 1px;">
  <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,102,255,0.12)" stroke-width="10"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#0066ff" stroke-width="10" stroke-dasharray="245 82" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="rgba(255,195,0,0.12)" stroke-width="9"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="#ffc300" stroke-width="9" stroke-dasharray="132 107" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="rgba(255,34,68,0.12)" stroke-width="8"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="#ff2244" stroke-width="8" stroke-dasharray="50 101" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <text x="52" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#ffc300">R</text>
  <text x="70" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#0066ff">B</text>
</svg><span style="font-family:monospace;font-weight:900;font-size:40px;color:#ffb300;line-height:1;">N</span></div></div>
  <h2 style="font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px;">Create your account</h2>
  <p style="font-size:13px;color:rgba(26,26,46,0.45);margin-bottom:28px;font-weight:500;">You're live immediately — no waiting.</p>
  <div style="display:flex;flex-direction:column;gap:10px;flex:1;">
    <input class="finp" id="c-name" type="text" placeholder="Full name" autocomplete="name">
    <input class="finp" id="c-email" type="email" placeholder="Email address" autocomplete="email">
    <div class="pw-wrap">
      <input class="finp" id="c-pwd" type="password" placeholder="Password (min. 8 characters)" autocomplete="new-password" oninput="chkStr(this.value)">
    </div>
    <div id="pwd-strength" style="height:4px;border-radius:2px;margin-top:4px;background:rgba(0,0,0,0.08);display:none;"><div id="pwd-strength-bar" style="height:100%;border-radius:2px;width:0%;transition:all 0.3s;"></div></div>
    <div id="pwd-strength-lbl" style="font-size:11px;font-weight:700;margin-top:2px;display:none;"></div>
    <input class="finp" id="c-pwd2" type="password" placeholder="Confirm password" autocomplete="new-password" oninput="chkMatch()" style="margin-top:4px;">
    <div id="pwd-match-lbl" style="font-size:11px;font-weight:700;margin-top:2px;display:none;"></div>
  </div>
  <div style="margin-top:28px;display:flex;flex-direction:column;gap:10px;">
    <button class="btn-primary" onclick="doCreate()">CREATE ACCOUNT →</button>
    <p style="text-align:center;font-size:11px;color:rgba(26,26,46,0.4);margin-top:4px;">By continuing you agree to our <a href="#" style="color:#0066ff;">Terms</a> &amp; <a href="#" style="color:#0066ff;">Privacy Policy</a></p>
    <p style="text-align:center;font-size:13px;margin-top:4px;">Already have an account? <button onclick="showSignin()" style="background:none;border:none;cursor:pointer;font-size:13px;color:#0066ff;font-weight:700;padding:0;">Sign in →</button></p>
  </div>
</div>

<!-- SIGN IN -->
<div class="screen" id="panel-signin" style="display:none;">
  <div style="margin-bottom:12px;"><button onclick="showCreate()" class="t-back">←</button></div>
  <div style="text-align:center;margin-bottom:32px;"><div style="display:inline-flex;align-items:center;white-space:nowrap;"><span style="font-family:monospace;font-weight:900;font-size:24px;color:#0066ff;line-height:1;">TRACK</span><span style="font-family:monospace;font-weight:900;font-size:24px;color:#ff2244;line-height:1;">TI</span><svg width="26" height="26" viewBox="0 0 120 120" style="display:inline-block;vertical-align:middle;flex-shrink:0;margin:0 1px;">
  <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,102,255,0.12)" stroke-width="10"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#0066ff" stroke-width="10" stroke-dasharray="245 82" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="rgba(255,195,0,0.12)" stroke-width="9"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="#ffc300" stroke-width="9" stroke-dasharray="132 107" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="rgba(255,34,68,0.12)" stroke-width="8"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="#ff2244" stroke-width="8" stroke-dasharray="50 101" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <text x="52" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#ffc300">R</text>
  <text x="70" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#0066ff">B</text>
</svg><span style="font-family:monospace;font-weight:900;font-size:24px;color:#ffb300;line-height:1;">N</span></div></div>
  <h2 style="font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px;">Welcome back</h2>
  <p style="font-size:13px;color:rgba(26,26,46,0.45);margin-bottom:28px;font-weight:500;">Sign in to your account.</p>
  <div style="display:flex;flex-direction:column;gap:10px;flex:1;">
    <input class="finp" id="si-email" type="email" placeholder="Email address" autocomplete="email">
    <div class="pw-wrap">
      <input class="finp" id="si-pwd" type="password" placeholder="Password" autocomplete="current-password">
      <button class="eye-btn" onclick="toggleEye('si-pwd',this)" type="button">👁</button>
    </div>
  </div>
  <div style="margin-top:28px;display:flex;flex-direction:column;gap:10px;">
    <button class="btn-primary" onclick="doSignIn()">SIGN IN →</button>
    <div style="text-align:center;margin-top:4px;"><button onclick="showCreate()" style="background:none;border:none;cursor:pointer;font-size:13px;color:#0066ff;font-weight:700;">New here? Create account →</button></div>
  </div>
</div>

<script>
function goTo(u){document.body.style.opacity='0';document.body.style.transition='opacity 0.15s ease';setTimeout(function(){window.location.href=u;},150);}
function showCreate(){document.getElementById('panel-create').style.display='flex';document.getElementById('panel-signin').style.display='none';}
function showSignin(){document.getElementById('panel-create').style.display='none';document.getElementById('panel-signin').style.display='flex';}
function chkMatch(){var p1=document.getElementById('c-pwd').value,p2=document.getElementById('c-pwd2').value,lbl=document.getElementById('pwd-match-lbl');if(!lbl||!p2)return;lbl.style.display='block';if(p1===p2){lbl.textContent='✓ Passwords match';lbl.style.color='#34c97a';}else{lbl.textContent='✗ Passwords do not match';lbl.style.color='#ff2244';}}
function chkStr(v){var bar=document.getElementById('pwd-strength-bar'),lbl=document.getElementById('pwd-strength-lbl'),wrap=document.getElementById('pwd-strength');if(!bar||!v)return;wrap.style.display='block';lbl.style.display='block';var sc=0;if(v.length>=8)sc++;if(v.length>=12)sc++;if(/[A-Z]/.test(v))sc++;if(/[0-9]/.test(v))sc++;if(/[^A-Za-z0-9]/.test(v))sc++;var colors=['#ff2244','#ff6b35','#ffb300','#34c97a','#1a9e5c'],labels=['Too short','Weak','Fair','Strong','Very strong'],widths=['20%','40%','60%','80%','100%'],i=Math.min(sc,4);bar.style.width=widths[i];bar.style.background=colors[i];lbl.textContent=labels[i];lbl.style.color=colors[i];}
function toggleEye(id,btn){var inp=document.getElementById(id);inp.type=inp.type==='password'?'text':'password';btn.textContent=inp.type==='password'?'👁':'🙈';}
function doCreate(){var name=document.getElementById('c-name').value.trim(),email=document.getElementById('c-email').value.trim(),pwd=document.getElementById('c-pwd').value,pwd2=document.getElementById('c-pwd2').value;if(!name||!email||pwd.length<8){alert('Please fill in all fields. Password must be at least 8 characters.');return;}if(pwd!==pwd2){alert('Passwords do not match.');return;}localStorage.setItem('tracktion_user',JSON.stringify({name:name,email:email}));goTo('baseline.html');}
function doSignIn(){var email=document.getElementById('si-email').value.trim(),pwd=document.getElementById('si-pwd').value;if(!email||!pwd){alert('Please enter your email and password.');return;}var user=JSON.parse(localStorage.getItem('tracktion_user')||'null');if(user&&user.email===email){goTo(localStorage.getItem('tracktion_targets')?'index.html':'baseline.html');}else{alert('Account not found. Please create an account first.');}}
(function(){if(window.location.search.includes('mode=signin'))showSignin();})();
</script></body></html>
