<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><title>TRACKTION — Account</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
*::-webkit-scrollbar{display:none;}*{scrollbar-width:none;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#f4f5f8;overflow-y:auto;}
body{display:flex;flex-direction:column;align-items:center;animation:pgIn 0.2s ease;}
@keyframes pgIn{from{opacity:0;}to{opacity:1;}}
.screen{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;padding:32px 24px 32px;box-sizing:border-box;background:#f4f5f8;}
.finp{width:100%;background:#ffffff;border:1.5px solid rgba(0,0,0,0.09);border-radius:12px;color:#1a1a2e;font-size:15px;padding:14px 16px;outline:none;font-family:inherit;}
.finp:focus{border-color:#0066ff;border-width:2px;}
.finp::placeholder{color:rgba(0,0,0,0.45);}
.pw-wrap{position:relative;}
.eye-btn{position:absolute;right:14px;top:14px;background:none;border:none;font-size:18px;color:rgba(0,0,0,0.45);cursor:pointer;}
.btn-primary{width:100%;padding:15px;border-radius:12px;border:none;background:#0066ff;color:#fff;font-family:monospace;font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer;}
.btn-primary:active{opacity:0.88;}
.back-btn-sq{background:#eeeff2;border:1px solid rgba(0,0,0,0.09);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#1a1a2e;border:none;flex-shrink:0;}
</style></head><body>

<!-- CREATE -->
<div class="screen" id="panel-create">
  <div style="margin-bottom:20px;"><button class="back-btn-sq" onclick="goTo('welcome.html')">←</button></div>
  <div style="margin-bottom:24px;"><div style="display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;white-space:nowrap;gap:0;"><span style="font-family:monospace;font-weight:900;font-size:40px;color:#0066ff;line-height:1;">TRACK</span><span style="font-family:monospace;font-weight:900;font-size:40px;color:#ff2244;line-height:1;">TI</span><svg width="42" height="42" viewBox="0 0 120 120" style="display:inline-block;vertical-align:middle;flex-shrink:0;margin:0 1px;">
  <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,102,255,0.12)" stroke-width="10"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#0066ff" stroke-width="10" stroke-dasharray="245 82" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="rgba(255,195,0,0.12)" stroke-width="9"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="#ffc300" stroke-width="9" stroke-dasharray="132 107" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="rgba(255,34,68,0.12)" stroke-width="8"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="#ff2244" stroke-width="8" stroke-dasharray="50 101" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <text x="52" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#ffc300">R</text>
  <text x="70" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#0066ff">B</text>
</svg><span style="font-family:monospace;font-weight:900;font-size:40px;color:#ffc300;line-height:1;">N</span></div></div>
  <h2 style="font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px;">Create your account</h2>
  <p style="font-size:13px;color:rgba(0,0,0,0.45);margin-bottom:28px;">You're live immediately — no waiting.</p>
  <div style="display:flex;flex-direction:column;gap:10px;flex:1;">
    <input class="finp" id="c-name" type="text" placeholder="Full name" autocomplete="name">
    <input class="finp" id="c-email" type="email" placeholder="Email address" autocomplete="email">
    <div class="pw-wrap">
      <input class="finp" id="c-pwd" type="password" placeholder="Password (min. 8 characters)" autocomplete="new-password" oninput="checkPwdStrength(this.value)">
    </div>
    <div id="pwd-strength" style="height:4px;border-radius:2px;margin-top:6px;background:#e0e0e0;display:none;"><div id="pwd-strength-bar" style="height:100%;border-radius:2px;width:0%;transition:all 0.3s;"></div></div>
    <div id="pwd-strength-lbl" style="font-size:11px;font-weight:600;margin-top:4px;display:none;"></div>
    <input class="finp" id="c-pwd2" type="password" placeholder="Confirm password" autocomplete="new-password" oninput="checkPwdMatch()" style="margin-top:10px;">
    <div id="pwd-match-lbl" style="font-size:11px;font-weight:600;margin-top:4px;display:none;"></div>
  </div>
  <div style="margin-top:28px;display:flex;flex-direction:column;gap:10px;">
    <button class="btn-primary" onclick="doCreate()">CREATE ACCOUNT →</button>
    <p style="text-align:center;font-size:11px;color:rgba(0,0,0,0.45);margin-top:4px;">By continuing you agree to our <a href="#" style="color:#0066ff;">Terms</a> &amp; <a href="#" style="color:#0066ff;">Privacy Policy</a></p>
    <p style="text-align:center;font-size:13px;margin-top:4px;">Already have an account? <button onclick="showSignin()" style="background:none;border:none;cursor:pointer;font-size:13px;color:#0066ff;font-weight:600;padding:0;">Sign in →</button></p>
  </div>
</div>

<!-- SIGN IN -->
<div class="screen" id="panel-signin" style="display:none;">
  <div style="margin-bottom:12px;"><button class="back-btn-sq" onclick="showCreate()">←</button></div>
  <div style="margin-bottom:32px;"><div style="display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;white-space:nowrap;gap:0;"><span style="font-family:monospace;font-weight:900;font-size:24px;color:#0066ff;line-height:1;">TRACK</span><span style="font-family:monospace;font-weight:900;font-size:24px;color:#ff2244;line-height:1;">TI</span><svg width="28" height="28" viewBox="0 0 120 120" style="display:inline-block;vertical-align:middle;flex-shrink:0;margin:0 1px;">
  <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,102,255,0.12)" stroke-width="10"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#0066ff" stroke-width="10" stroke-dasharray="245 82" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="rgba(255,195,0,0.12)" stroke-width="9"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="#ffc300" stroke-width="9" stroke-dasharray="132 107" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="rgba(255,34,68,0.12)" stroke-width="8"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="#ff2244" stroke-width="8" stroke-dasharray="50 101" stroke-linecap="round" transform="rotate(-90 60 60)"/>
  <text x="52" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#ffc300">R</text>
  <text x="70" y="68" text-anchor="middle" font-family="monospace" font-weight="900" font-size="20" fill="#0066ff">B</text>
</svg><span style="font-family:monospace;font-weight:900;font-size:24px;color:#ffc300;line-height:1;">N</span></div></div>
  <h2 style="font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px;">Welcome back</h2>
  <p style="font-size:13px;color:rgba(0,0,0,0.45);margin-bottom:28px;">Sign in to your account.</p>
  <div style="display:flex;flex-direction:column;gap:10px;flex:1;">
    <input class="finp" id="si-email" type="email" placeholder="Email address" autocomplete="email">
    <div class="pw-wrap">
      <input class="finp" id="si-pwd" type="password" placeholder="Password" autocomplete="current-password">
      <button class="eye-btn" onclick="toggleEye('si-pwd',this)" type="button">👁</button>
    </div>
  </div>
  <div style="margin-top:28px;display:flex;flex-direction:column;gap:10px;">
    <button class="btn-primary" onclick="doSignIn()">SIGN IN →</button>
    <div style="text-align:center;margin-top:4px;"><button onclick="showCreate()" style="background:none;border:none;cursor:pointer;font-size:13px;color:#0066ff;font-weight:600;">New here? Create account →</button></div>
  </div>
</div>

<script>
function goTo(u){document.body.style.opacity='0';document.body.style.transition='opacity 0.15s ease';setTimeout(function(){window.location.href=u;},150);}
function showCreate(){document.getElementById('panel-create').style.display='flex';document.getElementById('panel-signin').style.display='none';}
function showSignin(){document.getElementById('panel-create').style.display='none';document.getElementById('panel-signin').style.display='flex';}
function checkPwdMatch(){var p1=document.getElementById('c-pwd').value,p2=document.getElementById('c-pwd2').value,lbl=document.getElementById('pwd-match-lbl');if(!lbl||!p2)return;lbl.style.display='block';if(p1===p2){lbl.textContent='✓ Passwords match';lbl.style.color='#34c97a';}else{lbl.textContent='✗ Passwords do not match';lbl.style.color='#ff2244';}}
function checkPwdStrength(val){var bar=document.getElementById('pwd-strength-bar'),lbl=document.getElementById('pwd-strength-lbl'),wrap=document.getElementById('pwd-strength');if(!bar||!val)return;wrap.style.display='block';lbl.style.display='block';var sc=0;if(val.length>=8)sc++;if(val.length>=12)sc++;if(/[A-Z]/.test(val))sc++;if(/[0-9]/.test(val))sc++;if(/[^A-Za-z0-9]/.test(val))sc++;var colors=['#ff2244','#ff6b35','#ffb300','#34c97a','#1a9e5c'],labels=['Too short','Weak','Fair','Strong','Very strong'],widths=['20%','40%','60%','80%','100%'],i=Math.min(sc,4);bar.style.width=widths[i];bar.style.background=colors[i];lbl.textContent=labels[i];lbl.style.color=colors[i];}
function toggleEye(id,btn){var inp=document.getElementById(id);inp.type=inp.type==='password'?'text':'password';btn.textContent=inp.type==='password'?'👁':'🙈';}
function doCreate(){var name=document.getElementById('c-name').value.trim(),email=document.getElementById('c-email').value.trim(),pwd=document.getElementById('c-pwd').value,pwd2=document.getElementById('c-pwd2').value;if(!name||!email||pwd.length<8){alert('Please fill in all fields. Password must be at least 8 characters.');return;}if(pwd!==pwd2){alert('Passwords do not match.');return;}localStorage.setItem('tracktion_user',JSON.stringify({name:name,email:email}));goTo('baseline.html');}
function doSignIn(){var email=document.getElementById('si-email').value.trim(),pwd=document.getElementById('si-pwd').value;if(!email||!pwd){alert('Please enter your email and password.');return;}var user=JSON.parse(localStorage.getItem('tracktion_user')||'null');if(user&&user.email===email){goTo(localStorage.getItem('tracktion_targets')?'index.html':'baseline.html');}else{alert('Account not found. Please create an account first.');}}
(function(){if(window.location.search.includes('mode=signin'))showSignin();})();
</script></body></html>
