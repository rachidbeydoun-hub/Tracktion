<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f5f8">
<title>TRACKTION — Account</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
*::-webkit-scrollbar{display:none;}*{scrollbar-width:none;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;background:#f4f5f8;color:#1a1a2e;}
body{display:flex;justify-content:center;align-items:flex-start;animation:pgIn 0.15s ease;}
@keyframes pgIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.screen{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;padding:36px 24px 32px;background:#f4f5f8;}

/* WORDMARK */
.wordmark{font-family:monospace;font-size:30px;font-weight:900;letter-spacing:-1px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:fadeUp 0.4s ease 0.1s both;}
.wm-track{color:#0066ff;}
.wm-ti{color:#ff2244;}
.wm-on{color:#ffb300;}

/* BACK */
.back-btn{background:none;border:none;font-size:13px;font-weight:700;color:#0066ff;cursor:pointer;padding:0;margin-bottom:20px;display:flex;align-items:center;gap:4px;animation:fadeUp 0.3s ease both;}
.back-btn:active{opacity:0.7;}

/* FIELD LABEL */
.finp-lbl{font-size:10px;font-weight:800;color:#1a1a2e;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block;}

/* INPUTS */
.finp{width:100%;background:white;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;color:#1a1a2e;font-size:15px;padding:14px 16px;outline:none;font-family:inherit;display:block;}
.finp:focus{border:1.5px solid #0066ff;}
.finp::placeholder{color:rgba(26,26,46,0.35);}
.pw-wrap{position:relative;}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:rgba(26,26,46,0.4);cursor:pointer;padding:0;}

/* STRENGTH BAR */
.str-wrap{height:3px;border-radius:2px;background:rgba(0,0,0,0.08);margin-top:6px;display:none;}
.str-bar{height:100%;border-radius:2px;width:0%;transition:all 0.3s;}
.str-lbl{font-size:11px;font-weight:700;margin-top:4px;display:none;}
.match-lbl{font-size:11px;font-weight:700;margin-top:4px;display:none;}

/* INLINE ERROR */
.err-lbl{font-size:11px;font-weight:700;color:#ff2244;margin-top:4px;display:none;}

/* BUTTONS */
.btn-primary{width:100%;padding:15px;border-radius:12px;border:none;background:#0066ff;color:white;font-family:monospace;font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer;}
.btn-primary:active{opacity:0.88;}

/* TERMS */
.terms-txt{font-size:11px;color:#1a1a2e;text-align:center;line-height:1.6;}
.terms-txt a{color:#0066ff;font-weight:700;text-decoration:none;}

/* SWITCH */
.switch-txt{font-size:13px;color:#1a1a2e;text-align:center;}
.switch-txt button{background:none;border:none;cursor:pointer;font-size:13px;color:#0066ff;font-weight:700;padding:0;}

/* DIVIDER */
.divider{height:0.5px;background:rgba(0,0,0,0.08);}
</style>
</head>
<body>

<!-- CREATE ACCOUNT -->
<div class="screen" id="panel-create">
  <button class="back-btn" onclick="goTo('welcome.html')">← Back</button>

  <div class="wordmark">
    <span class="wm-track">TRACK</span><span class="wm-ti">TI</span><span class="wm-on">ON</span>
  </div>

  <h2 style="font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px;animation:fadeUp 0.4s ease 0.2s both;white-space:nowrap;">Create your account</h2>
  <p style="font-size:13px;font-weight:600;color:#0066ff;margin-bottom:24px;animation:fadeUp 0.4s ease 0.25s both;">Start tracking in 60 seconds.</p>

  <div style="display:flex;flex-direction:column;gap:12px;flex:1;animation:fadeUp 0.4s ease 0.3s both;">

    <div>
      <label class="finp-lbl" for="c-name">Full name</label>
      <input class="finp" id="c-name" type="text" placeholder="Full name" autocomplete="name">
    </div>

    <div>
      <label class="finp-lbl" for="c-email">Email</label>
      <input class="finp" id="c-email" type="email" placeholder="email@example.com" autocomplete="email">
    </div>

    <div>
      <label class="finp-lbl" for="c-pwd">Password</label>
      <div class="pw-wrap">
        <input class="finp" id="c-pwd" type="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="chkStr(this.value)" style="padding-right:48px;">
        <button class="eye-btn" onclick="toggleEye('c-pwd',this)" type="button">👁</button>
      </div>
      <div class="str-wrap" id="pwd-strength"><div class="str-bar" id="pwd-strength-bar"></div></div>
      <div class="str-lbl" id="pwd-strength-lbl"></div>
    </div>

    <div>
      <label class="finp-lbl" for="c-pwd2">Confirm password</label>
      <input class="finp" id="c-pwd2" type="password" placeholder="Repeat password" autocomplete="new-password" oninput="chkMatch()">
      <div class="match-lbl" id="pwd-match-lbl"></div>
    </div>

  </div>

  <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px;animation:fadeUp 0.4s ease 0.4s both;">
    <button class="btn-primary" onclick="doCreate()">CREATE ACCOUNT →</button>
    <div class="terms-txt">By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a></div>
    <div class="divider"></div>
    <div class="switch-txt">Already have an account? <button onclick="showSignin()">Sign in →</button></div>
  </div>
</div>

<!-- SIGN IN -->
<div class="screen" id="panel-signin" style="display:none;">
  <button class="back-btn" onclick="goTo('welcome.html')">← Back</button>

  <div class="wordmark">
    <span class="wm-track">TRACK</span><span class="wm-ti">TI</span><span class="wm-on">ON</span>
  </div>

  <h2 style="font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px;animation:fadeUp 0.4s ease 0.2s both;">Welcome back</h2>
  <p style="font-size:13px;font-weight:600;color:#0066ff;margin-bottom:28px;animation:fadeUp 0.4s ease 0.25s both;">Good to see you again.</p>

  <div style="display:flex;flex-direction:column;gap:12px;flex:1;animation:fadeUp 0.4s ease 0.3s both;">

    <div>
      <label class="finp-lbl" for="si-email">Email</label>
      <input class="finp" id="si-email" type="email" placeholder="email@example.com" autocomplete="email">
    </div>

    <div>
      <label class="finp-lbl" for="si-pwd">Password</label>
      <div class="pw-wrap">
        <input class="finp" id="si-pwd" type="password" placeholder="Your password" autocomplete="current-password" style="padding-right:48px;">
        <button class="eye-btn" onclick="toggleEye('si-pwd',this)" type="button">👁</button>
      </div>
    </div>

    <div style="text-align:right;margin-top:-4px;">
      <button style="background:none;border:none;cursor:pointer;font-size:12px;color:#0066ff;font-weight:700;padding:0;">Forgot password?</button>
    </div>

  </div>

  <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px;animation:fadeUp 0.4s ease 0.4s both;">
    <button class="btn-primary" onclick="doSignIn()">SIGN IN →</button>
    <div class="divider"></div>
    <div class="switch-txt">New here? <button onclick="showCreate()">Create account →</button></div>
  </div>
</div>

<script>
function goTo(u){document.body.style.opacity='0';document.body.style.transition='opacity 0.15s ease';setTimeout(function(){window.location.href=u;},150);}
function showCreate(){document.getElementById('panel-create').style.display='flex';document.getElementById('panel-signin').style.display='none';window.scrollTo(0,0);}
function showSignin(){document.getElementById('panel-create').style.display='none';document.getElementById('panel-signin').style.display='flex';window.scrollTo(0,0);}
function chkMatch(){
  var p1=document.getElementById('c-pwd').value,p2=document.getElementById('c-pwd2').value,lbl=document.getElementById('pwd-match-lbl');
  if(!p2){lbl.style.display='none';return;}
  lbl.style.display='block';
  if(p1===p2){lbl.textContent='✓ Passwords match';lbl.style.color='#34c97a';}
  else{lbl.textContent='✗ Passwords do not match';lbl.style.color='#ff2244';}
}
function chkStr(v){
  var bar=document.getElementById('pwd-strength-bar'),lbl=document.getElementById('pwd-strength-lbl'),wrap=document.getElementById('pwd-strength');
  if(!v){wrap.style.display='none';lbl.style.display='none';return;}
  wrap.style.display='block';lbl.style.display='block';
  var sc=0;
  if(v.length>=8)sc++;if(v.length>=12)sc++;
  if(/[A-Z]/.test(v))sc++;if(/[0-9]/.test(v))sc++;if(/[^A-Za-z0-9]/.test(v))sc++;
  var colors=['#ff2244','#ff6b35','#ffb300','#34c97a','#1a9e5c'],labels=['Too short','Weak','Fair','Strong','Very strong'],widths=['20%','40%','60%','80%','100%'],i=Math.min(sc,4);
  bar.style.width=widths[i];bar.style.background=colors[i];lbl.textContent=labels[i];lbl.style.color=colors[i];
}
function toggleEye(id,btn){
  var inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}
function showErr(id,msg){var el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block';}}
function hideErrs(){['err-name','err-email','err-pwd'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='none';});}
function doCreate(){
  var name=document.getElementById('c-name').value.trim(),
      email=document.getElementById('c-email').value.trim(),
      pwd=document.getElementById('c-pwd').value,
      pwd2=document.getElementById('c-pwd2').value;
  if(!name||!email||pwd.length<8||pwd!==pwd2){
    if(!name||!email||pwd.length<8){
      var lbl=document.getElementById('pwd-strength-lbl');
      if(lbl&&pwd.length<8&&pwd.length>0){lbl.textContent='Password too short';lbl.style.color='#ff2244';lbl.style.display='block';}
    }
    if(pwd!==pwd2&&pwd2){
      var ml=document.getElementById('pwd-match-lbl');
      if(ml){ml.textContent='✗ Passwords do not match';ml.style.color='#ff2244';ml.style.display='block';}
    }
    return;
  }
  try{localStorage.setItem('tracktion_user',JSON.stringify({name:name,email:email}));}catch(e){}
  goTo('baseline.html');
}
function doSignIn(){
  var email=document.getElementById('si-email').value.trim(),pwd=document.getElementById('si-pwd').value;
  if(!email||!pwd)return;
  var user=null;
  try{user=JSON.parse(localStorage.getItem('tracktion_user')||'null');}catch(e){}
  if(user&&user.email===email){
    try{goTo(localStorage.getItem('tracktion_targets')?'index.html':'baseline.html');}catch(e){goTo('baseline.html');}
  }else{
    var lbl=document.querySelector('#panel-signin .switch-txt');
    var errDiv=document.getElementById('si-err');
    if(!errDiv){
      errDiv=document.createElement('div');
      errDiv.id='si-err';
      errDiv.style.cssText='font-size:12px;font-weight:700;color:#ff2244;text-align:center;margin-top:4px;';
      document.querySelector('#panel-signin .btn-primary').after(errDiv);
    }
    errDiv.textContent='Account not found. Please create an account first.';
  }
}
(function(){
  try{if(window.location.search.includes('mode=signin'))showSignin();}catch(e){}
})();
</script>
</body>
</html>
